    <meta property="og:description" content="State Bank of India (SBI) has invited online applications for 116 Specialist Cadre Officer (SCO) vacancies under Recruitment 2026. The posts include Assistant Vice President (IS Audit) on contractual basis and Deputy Manager (IS Audit and CA–Internal Audit) in MMGS-II scale. The online registration started on 23/02/2026 and the last date to apply is 15/03/2026. The selection process consists of shortlisting followed by an interview. The AVP position offers a CTC up to ₹50 lakh, while Deputy Manager posts come with regular pay scale and benefits. Interested candidates must fulfill the required educational qualifications, experience criteria and age limits (21–45 years as applicable). The application fee is ₹750 for General/EWS/OBC candidates, whereas SC/ST/PwBD applicants are exempted from fee payment.">
