    <meta property="og:description" content="Reserve Bank of India has invited online applications for 650 Assistant posts under RBI Assistant Recruitment 2026. Candidates holding a Bachelor’s degree with minimum 50% marks (pass class for SC/ST/PwBD) and basic computer knowledge can apply from 16/02/2026 to 08/03/2026. The recruitment process consists of Preliminary Exam, Main Exam and Language Proficiency Test. The Prelims will be held on 11/04/2026 and the Mains on 07/06/2026. Selected candidates will receive a starting basic pay of ₹29,000 and an initial gross salary of around ₹58,514 per month.">
