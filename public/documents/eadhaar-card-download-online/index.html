  Aadhaar Card – Important Information
  
    
      Details
      Description
    
  
  
    
      Document Name
      Aadhaar Card
    
    
      Issuing Authority
      UIDAI (Unique Identification Authority of India)
    
    
      Aadhaar Number
      12-digit unique identity number
    
    
      Type of ID
      Proof of Identity and Proof of Address
    
    
      Used For
      Bank account, SIM card, government schemes, pension, scholarship, subsidy, KYC, etc.
    
    
      Eligibility
      Any resident of India, including children
    
    
      Required Documents
      Proof of Identity, Proof of Address, Date of Birth document (as per UIDAI list)
    
    
      How to Enrol
      Visit nearest Aadhaar Enrolment/Update Centre with required documents and biometrics
    
    
      Download Aadhaar
      From UIDAI website or mAadhaar app using Aadhaar Number / Enrolment ID and OTP
    
    
      PDF Password Format
      First 4 letters of name in CAPITAL &#43; Year of Birth (e.g., VIKR2001)
    
    
      Update Options
      Name, Address, Date of Birth, Mobile Number, Email, Photo, Biometrics (as per UIDAI rules)
    
    
      Update Charges
      ₹50 for demographic update, ₹100 for biometric update (may change as per UIDAI)
    
    
      Official Website
      https://uidai.gov.in and https://myaadhaar.uidai.gov.in
    
    
      Important Note
      Aadhaar is an identity proof, not proof of citizenship.
