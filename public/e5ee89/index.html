    <meta property="og:description" content="Indian Navy has invited online applications for Agniveer (Apprentice) 01/2027 and 02/2027 batches. Unmarried male candidates who have passed Class 10th and hold a 3-year AICTE-recognized Diploma with minimum 50% marks are eligible to apply. The recruitment process includes INET 2026, Physical Fitness Test, Written Examination, and Medical Examination. Selected candidates will receive attractive pay, allowances, insurance coverage, and Seva Nidhi benefits under the Agnipath Scheme. Eligible applicants can submit their online applications from 05 June 2026 to 29 June 2026.">
