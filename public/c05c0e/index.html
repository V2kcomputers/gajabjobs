    <meta property="og:description" content="Indian Army invites applications for NCC Special Entry Scheme 124th Course (Oct 2026) under Short Service Commission (Non-Technical) for Men. A total of 70 posts (63 General and 07 for Wards of Battle Casualties) are available. Eligible candidates must be unmarried male graduates holding NCC ‘C’ Certificate with minimum ‘B’ Grade. The selection procedure includes shortlisting based on NCC grading and graduation percentage, followed by SSB interview, medical examination, and final merit list. Selected candidates will receive 49 weeks of pre-commission training at Officers Training Academy (OTA), Chennai. The online application process will remain open from 12/02/2026 to 16/03/2026.">
