    <meta property="og:description" content="Council of Scientific &amp; Industrial Research (CSIR) invites online applications for 100 Assistant Section Officer (ASO) posts in General, Finance &amp; Accounts, and Stores &amp; Purchase cadres. Candidates with a Bachelor&rsquo;s Degree who are non-recommended candidates of UPSC Civil Services Examination (CSE) 2024 are eligible to apply. The online application process will remain open from 23/06/2026 to 13/07/2026. The maximum age limit is 33 years with applicable category-wise relaxation. UR/OBC/EWS candidates are required to pay an application fee of ₹500, while SC/ST/PwBD/Women/Ex-Servicemen candidates are exempted. Selection will be based on UPSC CSE 2024 marks followed by a qualifying Computer Proficiency Test (CPT).">
