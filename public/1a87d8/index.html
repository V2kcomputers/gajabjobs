    <meta property="og:description" content="MP Anganwadi Recruitment 2025 Phase-2 notification has been issued by the Women and Child Development Department, Madhya Pradesh, inviting applications for 4767 posts of Anganwadi Worker and Helper. The recruitment includes 1573 AWW and 3194 AWH vacancies and will be carried out through the MP Online selection portal on a district-wise basis. Only female candidates belonging to the same village or urban ward as the Anganwadi centre are eligible to apply. Applicants must have passed 12th standard, and the prescribed age limit is 18 to 35 years as on 01 January 2025. The online application window will remain open from 31 December 2025 to 10 January 2026, while corrections can be made up to 12 January 2026. Final selection will be based on merit, and no written examination will be held.">
