    <meta property="og:description" content="Indian Navy 10&#43;2 (B.Tech) Cadet Entry Recruitment 2026 is conducted for admission to a four-year B.Tech course at the Indian Naval Academy, Ezhimala, for grant of Permanent Commission in Executive and Technical Branches. Unmarried male and female candidates who have appeared in JEE (Main) 2025 are eligible to apply. Selection is based on JEE Main CRL shortlisting, SSB Interview, and medical fitness. The recruitment is for 44 posts, including a maximum of 07 posts for women. The online application window is open from 03 January 2026 to 19 January 2026, and no application fee is required.">
