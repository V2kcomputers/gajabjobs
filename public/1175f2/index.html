    <meta property="og:description" content="The Indian Air Force (IAF) invites online applications for Airmen Group &lsquo;Y&rsquo; Medical Assistant Intake 02/2027. Male Indian and Gorkha candidates meeting the required educational qualifications can submit their applications from 06 July 2026 to 26 July 2026. Eligible applicants must have completed 10&#43;2 with PCB and English or hold a Diploma/B.Pharm/B.Sc in Pharmacy. The recruitment process consists of an Online Examination, Physical Fitness Test, Adaptability Tests, and Medical Examination. During training, selected candidates will receive a monthly stipend of ₹14,600, followed by a starting salary of ₹26,900 per month after training. The online test is scheduled for 22-23 September 2026.">
