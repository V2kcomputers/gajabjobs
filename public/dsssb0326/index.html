    <meta property="og:description" content="Delhi Subordinate Services Selection Board (DSSSB) has published Advertisement No. 03/2026 inviting online applications for 1979 vacancies in teaching and non-teaching posts. The recruitment includes TGT (Computer Science), Special Educator, IT Assistant Grade-A, Junior Scientific Assistant, Domestic Science Teacher, Data Entry Operator, Lift Operator, Electrical Overseer and several other positions. Eligible candidates can submit their applications online from 16/06/2026 to 15/07/2026. Applicants should review the post-wise qualification, age limit, vacancy details, reservation criteria, examination scheme and selection process before applying. The selection process will be conducted through a One Tier Computer Based Test as prescribed by DSSSB.">
