    <meta property="og:description" content="IOCL Non-Executive Recruitment 2025 has been announced by Indian Oil Corporation Limited for various non-executive posts in its Refineries Division. The recruitment is open for Diploma and B.Sc qualified candidates to fill Junior Engineering Assistant, Junior Technical Assistant and Quality Control Analyst positions across multiple refinery locations in India. The selection will be based on a Computer Based Test followed by a qualifying Skill/Proficiency/Physical Test. Online applications are invited from 20 December 2025 to 09 January 2026 with a pay scale ranging from ₹25,000 to ₹1,05,000 along with standard PSU allowances.">
