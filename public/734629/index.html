    <meta property="og:description" content="UGC NET June 2026 is conducted by the National Testing Agency (NTA) to determine eligibility for Assistant Professor, Junior Research Fellowship (JRF), and Ph.D admission. The application process begins on 29 April 2026 and ends on 20 May 2026. Candidates must have a Master’s Degree with at least 55% marks (50% for reserved categories). The exam will be held from 22 June to 30 June 2026 in CBT mode. Eligible candidates can apply online through the official website.">
