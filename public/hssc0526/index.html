    <meta property="og:description" content="Haryana Staff Selection Commission (HSSC) has invited online applications for CET Group D Recruitment 2026. Candidates who have passed Matriculation (10th Class) with Hindi or Sanskrit as a subject are eligible to apply. The online application process begins on 19/06/2026 and will remain open until 03/07/2026. The age limit is 18 to 42 years with relaxation available for reserved categories as per Haryana Government rules. Selection will be based on the Common Eligibility Test (CET) followed by document verification. Interested candidates should read the official notification carefully and complete the online application before the last date.">
