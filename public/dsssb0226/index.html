    <meta property="og:description" content="Delhi Subordinate Services Selection Board (DSSSB) has released Advertisement 02/2026 for 216 vacancies in Group B and Group C categories across multiple Delhi Government departments. The online application window opens on 27/02/2026 and will remain active until 28/03/2026. Posts include Assistant Manager, Radiographer, Patwari, Reporter, Junior Law Officer and others. Candidates must fulfill the required educational qualifications, experience criteria and age conditions as on 28/03/2026. The recruitment process consists of One Tier or Two Tier computer-based examinations with negative marking. Eligible candidates can submit their applications through the official DSSSB online portal within the prescribed dates.">
