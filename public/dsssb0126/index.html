    <meta property="og:description" content="Delhi Subordinate Services Selection Board (DSSSB) has issued Advertisement No. 01/2026 for 911 posts under the Combined Examination 2026 across various departments of GNCT of Delhi. The recruitment includes Legal Assistant, Assistant Engineer (Civil), Junior Engineer (Civil), and Grade-II (GNCTDSS) / Assistant Section Officer positions. The online application window will remain open from 24/02/2026 to 25/03/2026. The selection process consists of a Computer Based Test (One Tier or Two Tier as per post) with negative marking. Educational qualifications differ by post, including a Law Degree for Legal Assistant, Civil Engineering Degree/Diploma for AE and JE, and a Bachelor’s Degree for ASO, while the upper age limit is generally 30 years with relaxation as per government norms.">
