    <meta property="og:description" content="Central Bank of India has invited online applications for 4500 Apprentice vacancies under the Apprentices Act, 1961. Eligible graduates who completed their degree on or after 01 January 2022 can apply from 12 June 2026 to 22 June 2026. The apprenticeship period is 12 months with a monthly stipend of ₹15,000. Selection will be based on an Online Examination, Local Language Test, Document Verification, and Medical Fitness. Candidates seeking banking sector experience should not miss this opportunity.">
